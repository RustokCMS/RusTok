[module]
slug = "comments"
name = "Comments"
version = "0.1.0"
description = "Generic comments domain for blog and other opt-in non-forum discussion surfaces"
ownership = "first_party"
trust_level = "verified"
ui_classification = "admin_only"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "CommentsModule"

[provides.admin_ui]
leptos_crate = "rustok-comments-admin"
route_segment = "comments"
nav_label = "Comments"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"
