[module]
slug = "channel"
name = "Channel"
version = "0.1.0"
description = "Experimental core channel-management context for external delivery surfaces."
ownership = "first_party"
trust_level = "core"
ui_classification = "admin_only"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "ChannelModule"

[provides.admin_ui]
leptos_crate = "rustok-channel-admin"
route_segment = "channels"
nav_label = "Channels"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

[[provides.admin_ui.pages]]
subpath = "targets"
title = "Channel Targets"
nav_label = "Targets"

[[provides.admin_ui.pages]]
subpath = "apps"
title = "Channel Apps"
nav_label = "Apps"
