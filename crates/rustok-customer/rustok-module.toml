[module]
slug = "customer"
name = "Customer"
version = "0.1.0"
description = "Default storefront customer submodule in the ecommerce family"
ownership = "first_party"
trust_level = "verified"
ui_classification = "admin_only"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "CustomerModule"

[provides.admin_ui]
leptos_crate = "rustok-customer-admin"
route_segment = "customers"
nav_label = "Customers"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"
