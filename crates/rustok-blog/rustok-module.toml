[module]
slug = "blog"
name = "Blog"
version = "0.1.0"
description = "Posts, Comments, Categories, Tags"
ownership = "first_party"
trust_level = "verified"
ui_classification = "dual_surface"
recommended_admin_surfaces = ["leptos-admin"]
showcase_admin_surfaces = ["next-admin"]

[marketplace]
category = "content"
tags = ["content", "editorial", "news"]

[dependencies]
content = { version_req = ">=0.1.0" }
comments = { version_req = ">=0.1.0" }
taxonomy = { version_req = ">=0.1.0" }

[settings]
postsPerPage = { type = "integer", default = 20, min = 1, max = 100, options = [10, 20, 50, 100], description = "Number of blog posts shown per page for a tenant." }
showAuthor = { type = "boolean", default = true, description = "Whether blog cards and pages show the author by default." }

[crate]
entry_type = "BlogModule"

[provides.graphql]
query = "graphql::BlogQuery"
mutation = "graphql::BlogMutation"

[provides.http]
routes = "controllers::routes"

[provides.admin_ui]
leptos_crate = "rustok-blog-admin"
route_segment = "blog"
nav_label = "Blog"
next_package = "@rustok/blog-admin"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

[provides.storefront_ui]
leptos_crate = "rustok-blog-storefront"
slot = "home_after_catalog"
route_segment = "blog"
page_title = "Blog"
next_package = "@rustok/blog-frontend"

[provides.storefront_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "storefront/locales"
