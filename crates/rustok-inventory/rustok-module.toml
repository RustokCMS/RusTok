[module]
slug = "inventory"
name = "Inventory"
version = "0.1.0"
description = "Inventory adjustments, availability checks, and stock-level persistence"
ownership = "first_party"
trust_level = "verified"
ui_classification = "admin_only"
recommended_admin_surfaces = ["leptos-admin"]

[dependencies]
product = { version_req = ">=0.1.0" }

[crate]
entry_type = "InventoryModule"

[provides.admin_ui]
leptos_crate = "rustok-inventory-admin"
route_segment = "inventory"
nav_label = "Inventory"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"
