[module]
slug = "commerce"
name = "Ecommerce"
version = "0.1.0"
description = "Ecommerce umbrella/root module for the commerce family, compatibility facade, and orchestration surface"
ownership = "first_party"
trust_level = "verified"
ui_classification = "dual_surface"
recommended_admin_surfaces = ["leptos-admin"]

[marketplace]
category = "commerce"
tags = ["commerce", "catalog", "checkout"]

[dependencies]
cart = { version_req = ">=0.1.0" }
customer = { version_req = ">=0.1.0" }
product = { version_req = ">=0.1.0" }
region = { version_req = ">=0.1.0" }
pricing = { version_req = ">=0.1.0" }
inventory = { version_req = ">=0.1.0" }
order = { version_req = ">=0.1.0" }
payment = { version_req = ">=0.1.0" }
fulfillment = { version_req = ">=0.1.0" }

[crate]
entry_type = "CommerceModule"

[provides.graphql]
query = "graphql::CommerceQuery"
mutation = "graphql::CommerceMutation"

[provides.http]
routes = "controllers::routes"

[provides.admin_ui]
leptos_crate = "rustok-commerce-admin"
route_segment = "commerce"
nav_label = "Commerce"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

[provides.storefront_ui]
leptos_crate = "rustok-commerce-storefront"
slot = "home_after_catalog"
route_segment = "commerce"
page_title = "Commerce"

[provides.storefront_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "storefront/locales"
