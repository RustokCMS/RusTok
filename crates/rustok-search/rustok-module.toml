[module]
slug = "search"
name = "Search"
version = "0.1.0"
description = "Postgres-first search capability with settings-driven engine selection."
ownership = "first_party"
trust_level = "core"
ui_classification = "dual_surface"
recommended_admin_surfaces = ["leptos-admin"]
showcase_admin_surfaces = ["next-admin"]

[marketplace]
category = "search"
tags = ["discovery", "indexing", "search"]

[crate]
entry_type = "SearchModule"

[provides.admin_ui]
leptos_crate = "rustok-search-admin"
route_segment = "search"
nav_label = "Search"
next_package = "@rustok/search-admin"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

[[provides.admin_ui.pages]]
subpath = "playground"
title = "Search Playground"
nav_label = "Playground"

[[provides.admin_ui.pages]]
subpath = "engines"
title = "Search Engines"
nav_label = "Engines"

[[provides.admin_ui.pages]]
subpath = "dictionaries"
title = "Search Dictionaries"
nav_label = "Dictionaries"

[[provides.admin_ui.pages]]
subpath = "analytics"
title = "Search Analytics"
nav_label = "Analytics"

[provides.storefront_ui]
leptos_crate = "rustok-search-storefront"
slot = "home_after_hero"
route_segment = "search"
page_title = "Search"
next_package = "@rustok/search-frontend"

[provides.storefront_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "storefront/locales"
