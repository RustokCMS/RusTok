[module]
slug = "outbox"
name = "Outbox"
version = "0.1.0"
description = "Transactional event persistence, relay, retry, and DLQ lifecycle."
ownership = "first_party"
trust_level = "core"
ui_classification = "admin_only"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "OutboxModule"

[provides.admin_ui]
leptos_crate = "rustok-outbox-admin"
route_segment = "outbox"
nav_label = "Outbox"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"
