[module]
slug = "region"
name = "Region"
version = "0.1.0"
description = "Default region submodule in the ecommerce family"
ownership = "first_party"
trust_level = "verified"
ui_classification = "dual_surface"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "RegionModule"

[provides.admin_ui]
leptos_crate = "rustok-region-admin"
route_segment = "regions"
nav_label = "Regions"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

[provides.storefront_ui]
leptos_crate = "rustok-region-storefront"
slot = "home_before_footer"
route_segment = "regions"
page_title = "Regions"

[provides.storefront_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "storefront/locales"
