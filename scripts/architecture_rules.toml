[apps]
# Only backend app(s) are checked by this rule. Frontend apps intentionally use
# dedicated UI libs from the workspace and are not constrained by rustok-* only.
target_packages = ["rustok-server"]
allowed_internal_dep_prefixes = ["rustok-"]
allowed_internal_dep_exceptions = [
  # Shared backend infra still outside rustok-* naming.
  "migration",
  "alloy",
]

[domain]
crates = [
  "rustok-blog",
  "rustok-commerce",
  "rustok-content",
  "rustok-forum",
  "rustok-index",
  "rustok-pages",
  "rustok-rbac",
  "rustok-tenant",
]
allowed_edges = [
  "rustok-blog -> rustok-content",
  "rustok-forum -> rustok-content",
  "rustok-pages -> rustok-content",
]

[imports]
# Restrict only backend app(s) from reaching internal crate modules.
target_packages = ["rustok-server"]

# use rustok_*::<segment>::... where <segment> below is considered internal.
deny_internal_segments = [
  "entities",
  "entity",
  "internal",
  "infrastructure",
  "infra",
  "repository",
  "repositories",
  "adapter",
  "adapters",
]

# Explicitly allowed nested paths from backend app(s) (must be reviewed intentionally).
explicitly_allowed_paths = [
  "rustok_commerce::entities",
  "rustok_content::entities",
  "rustok_outbox::entity",
]

